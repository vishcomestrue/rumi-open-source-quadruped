<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rumi — Open Source Quadruped Robot</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .container {
      max-width: 640px;
    }

    .badge {
      display: inline-block;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 999px;
      padding: 0.25rem 0.75rem;
      font-size: 0.75rem;
      color: #8b949e;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #e6edf3 0%, #8b949e 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-size: 1.1rem;
      color: #8b949e;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }

    .actions {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    a.btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.6rem 1.25rem;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 500;
      text-decoration: none;
      transition: opacity 0.15s;
    }

    a.btn:hover {
      opacity: 0.8;
    }

    a.btn-primary {
      background: #238636;
      color: #fff;
      border: 1px solid #2ea043;
    }

    a.btn-secondary {
      background: #21262d;
      color: #e6edf3;
      border: 1px solid #30363d;
    }

    footer {
      margin-top: 4rem;
      font-size: 0.8rem;
      color: #484f58;
    }

    footer a {
      color: #484f58;
      text-decoration: none;
    }

    footer a:hover {
      color: #8b949e;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">Open Source Robotics</div>
    <h1>Rumi</h1>
    <p class="tagline">
      An open source quadruped robot — designed to be affordable,
      hackable, and a platform for learning legged locomotion.
    </p>
    <div class="actions">
      <a class="btn btn-primary" href="https://github.com/vishcomestrue/rumi-open-source-quadruped">
        View on GitHub
      </a>
      <a class="btn btn-secondary" href="https://github.com/vishcomestrue/rumi-open-source-quadruped/releases">
        Releases
      </a>
    </div>
  </div>

  <footer>
    <a href="https://github.com/vishcomestrue/rumi-open-source-quadruped">github.com/vishcomestrue/rumi-open-source-quadruped</a>
  </footer>
</body>
</html>
